name: Build and Release

on:
  push:
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS-arm64
    runs-on: macos-14
    env:
      VCPKG_BINARY_SOURCES: "clear;default"

    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure and Build
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_TRIPLET=arm64-osx \
            -DCMAKE_OSX_ARCHITECTURES=arm64

          cmake --build build --config Release

      - name: Package Artifacts
        run: |
          mkdir -p release
          cp build/cfrp release/ || cp build/Release/cfrp release/
          cp config_server.toml release/
          cp config_client.toml release/

          cd release
          tar -czvf ../cfrp-macos-arm64.tar.gz *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfrp-macos-arm64
          path: cfrp-macos-arm64.tar.gz

  build-linux:
    name: Build Linux-amd64 (GCC)
    runs-on: ubuntu-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;default"
      # 🔥 CRITICAL FIX: disable Werror globally
      CFLAGS: "-Wno-error"
      CXXFLAGS: "-Wno-error"

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            zip unzip tar curl \
            ninja-build

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure
        run: |
          cmake -B build -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DCMAKE_C_FLAGS="-Wno-error" \
            -DCMAKE_CXX_FLAGS="-Wno-error"

      - name: Build
        run: |
          cmake --build build --config Release

      - name: Package Artifacts
        run: |
          mkdir -p release
          cp build/cfrp release/ || cp build/Release/cfrp release/
          cp config_server.toml release/
          cp config_client.toml release/

          # optional: shrink binary
          strip release/cfrp || true

          cd release
          tar -czvf ../cfrp-linux-amd64.tar.gz *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfrp-linux-amd64
          path: cfrp-linux-amd64.tar.gz

  release:
    name: Create Release
    needs: [build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Debug list files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
