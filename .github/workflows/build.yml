name: Build and Release

on:
  push:
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:

  # ---------------- macOS ----------------
  build-macos:
    name: macOS-arm64
    runs-on: macos-14
    env:
      VCPKG_BINARY_SOURCES: "clear;default"

    steps:
      - uses: actions/checkout@v4

      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_TRIPLET=arm64-osx \
            -DCMAKE_OSX_ARCHITECTURES=arm64

          cmake --build build --config Release

      - run: |
          mkdir release
          cp build/cfrp release/ || cp build/Release/cfrp release/
          cp config_*.toml release/

          cd release
          tar -czf ../cfrp-macos-arm64.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: cfrp-macos-arm64
          path: cfrp-macos-arm64.tar.gz


  # ---------------- Linux amd64 ----------------
  build-linux-amd64:
    name: Linux-amd64 (GCC)
    runs-on: ubuntu-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;default"
      CFLAGS: "-Wno-error"
      CXXFLAGS: "-Wno-error"

    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build pkg-config

      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DCMAKE_C_FLAGS="-Wno-error" \
            -DCMAKE_CXX_FLAGS="-Wno-error"

          cmake --build build

      - run: |
          mkdir release
          cp build/cfrp release/
          cp config_*.toml release/
          strip release/cfrp || true

          cd release
          tar -czf ../cfrp-linux-amd64.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: cfrp-linux-amd64
          path: cfrp-linux-amd64.tar.gz


  # ---------------- Linux arm64 ----------------
  build-linux-arm64:
    name: Linux-arm64 (GCC)
    runs-on: ubuntu-24.04-arm
    env:
      VCPKG_BINARY_SOURCES: "clear;default"
      CFLAGS: "-Wno-error"
      CXXFLAGS: "-Wno-error"

    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build pkg-config

      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_TRIPLET=arm64-linux \
            -DCMAKE_C_FLAGS="-Wno-error" \
            -DCMAKE_CXX_FLAGS="-Wno-error"

          cmake --build build

      - run: |
          mkdir release
          cp build/cfrp release/
          cp config_*.toml release/
          strip release/cfrp || true

          cd release
          tar -czf ../cfrp-linux-arm64.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: cfrp-linux-arm64
          path: cfrp-linux-arm64.tar.gz


  # ---------------- Windows amd64 ----------------
  build-windows-amd64:
    name: Windows-amd64
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;default"

    steps:
      - uses: actions/checkout@v4

      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      # 🔥 pkgconf fix
      - name: Setup pkg-config path
        shell: pwsh
        run: |
          $triplet="x64-windows"
          $root="$env:VCPKG_INSTALLATION_ROOT\installed\$triplet"
          echo "PKG_CONFIG_PATH=$root\lib\pkgconfig;$root\share\pkgconfig" >> $env:GITHUB_ENV

      - name: Configure
        run: |
          cmake -B build -S . `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir release
          copy build\Release\cfrp.exe release\
          copy config_*.toml release\

          powershell Compress-Archive -Path release\* -DestinationPath cfrp-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: cfrp-windows-amd64
          path: cfrp-windows-amd64.zip


  # ---------------- Windows arm64 ----------------
  build-windows-arm64:
    name: Windows-arm64
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;default"

    steps:
      - uses: actions/checkout@v4

      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      # 🔥 pkgconf fix
      - name: Setup pkg-config path
        shell: pwsh
        run: |
          $triplet="arm64-windows"
          $root="$env:VCPKG_INSTALLATION_ROOT\installed\$triplet"
          echo "PKG_CONFIG_PATH=$root\lib\pkgconfig;$root\share\pkgconfig" >> $env:GITHUB_ENV

      - name: Configure
        run: |
          cmake -B build -S . `
            -A ARM64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DVCPKG_TARGET_TRIPLET=arm64-windows

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir release
          copy build\Release\cfrp.exe release\
          copy config_*.toml release\

          powershell Compress-Archive -Path release\* -DestinationPath cfrp-windows-arm64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: cfrp-windows-arm64
          path: cfrp-windows-arm64.zip


  # ---------------- Release ----------------
  release:
    needs:
      [
        build-macos,
        build-linux-amd64,
        build-linux-arm64,
        build-windows-amd64,
        build-windows-arm64
      ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - run: ls -R artifacts

      - uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
