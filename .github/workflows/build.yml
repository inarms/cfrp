name: Build and Release

on:
  push:
    tags: [ 'v*' ]
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  packages: write


jobs:

  # =========================
  # macOS ARM64
  # =========================
  build-macos:
    name: macOS-arm64
    runs-on: macos-14
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg_cache,readwrite"

    steps:
      - uses: actions/checkout@v4

      - name: Create vcpkg cache directory
        run: mkdir -p ${{ github.workspace }}/vcpkg_cache

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-macos-arm64-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-macos-arm64-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Configure & Build
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_TRIPLET=arm64-osx \
            -DCMAKE_OSX_ARCHITECTURES=arm64

          cmake --build build --config Release

      - name: Package
        run: |
          mkdir -p release-server release-client/config.d
          EXE=$(ls build/cfrp build/Release/cfrp 2>/dev/null | head -n 1)
          
          # Server pack
          cp $EXE release-server/
          cp server.toml release-server/
          cp scripts/setup_macos_server.sh release-server/setup.sh
          cp scripts/uninstall_macos_server.sh release-server/uninstall.sh
          chmod +x release-server/setup.sh release-server/uninstall.sh
          tar -czf cfrp-server-macos-arm64.tar.gz -C release-server .
          
          # Client pack
          cp $EXE release-client/
          cp client.toml release-client/
          cp scripts/setup_macos_client.sh release-client/setup.sh
          cp scripts/uninstall_macos_client.sh release-client/uninstall.sh
          chmod +x release-client/setup.sh release-client/uninstall.sh
          tar -czf cfrp-client-macos-arm64.tar.gz -C release-client .

      - uses: actions/upload-artifact@v4
        with:
          name: cfrp-macos-arm64
          path: cfrp-*-macos-arm64.tar.gz


  # =========================
  # Linux AMD64 (GCC)
  # =========================
  build-linux-amd64:
    name: Linux-amd64 (GCC)
    runs-on: ubuntu-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg_cache,readwrite"
      CFLAGS: "-Wno-error"
      CXXFLAGS: "-Wno-error"

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build pkg-config

      - name: Create vcpkg cache directory
        run: mkdir -p ${{ github.workspace }}/vcpkg_cache

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-linux-amd64-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-linux-amd64-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Configure
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DCMAKE_C_FLAGS="-Wno-error" \
            -DCMAKE_CXX_FLAGS="-Wno-error"

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p release-server release-client/config.d
          strip build/cfrp || true
          
          # Server pack
          cp build/cfrp release-server/
          cp server.toml release-server/
          cp scripts/setup_linux_server.sh release-server/setup.sh
          cp scripts/uninstall_linux_server.sh release-server/uninstall.sh
          chmod +x release-server/setup.sh release-server/uninstall.sh
          tar -czf cfrp-server-linux-amd64.tar.gz -C release-server .
          
          # Client pack
          cp build/cfrp release-client/
          cp client.toml release-client/
          cp scripts/setup_linux_client.sh release-client/setup.sh
          cp scripts/uninstall_linux_client.sh release-client/uninstall.sh
          chmod +x release-client/setup.sh release-client/uninstall.sh
          tar -czf cfrp-client-linux-amd64.tar.gz -C release-client .

      - uses: actions/upload-artifact@v4
        with:
          name: cfrp-linux-amd64
          path: cfrp-*-linux-amd64.tar.gz


  # =========================
  # Linux ARM64 (GCC native)
  # =========================
  build-linux-arm64:
    name: Linux-arm64 (GCC)
    runs-on: ubuntu-24.04-arm
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg_cache,readwrite"
      CFLAGS: "-Wno-error"
      CXXFLAGS: "-Wno-error"

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build pkg-config

      - name: Create vcpkg cache directory
        run: mkdir -p ${{ github.workspace }}/vcpkg_cache

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-linux-arm64-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-linux-arm64-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Configure
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_TRIPLET=arm64-linux \
            -DCMAKE_C_FLAGS="-Wno-error" \
            -DCMAKE_CXX_FLAGS="-Wno-error"

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p release-server release-client/config.d
          strip build/cfrp || true
          
          # Server pack
          cp build/cfrp release-server/
          cp server.toml release-server/
          cp scripts/setup_linux_server.sh release-server/setup.sh
          cp scripts/uninstall_linux_server.sh release-server/uninstall.sh
          chmod +x release-server/setup.sh release-server/uninstall.sh
          tar -czf cfrp-server-linux-arm64.tar.gz -C release-server .
          
          # Client pack
          cp build/cfrp release-client/
          cp client.toml release-client/
          cp scripts/setup_linux_client.sh release-client/setup.sh
          cp scripts/uninstall_linux_client.sh release-client/uninstall.sh
          chmod +x release-client/setup.sh release-client/uninstall.sh
          tar -czf cfrp-client-linux-arm64.tar.gz -C release-client .

      - uses: actions/upload-artifact@v4
        with:
          name: cfrp-linux-arm64
          path: cfrp-*-linux-arm64.tar.gz


  # =========================
  # Windows AMD64
  # =========================
  build-windows-amd64:
    name: Windows-amd64
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg_cache,readwrite"

    steps:
      - uses: actions/checkout@v4

      - name: Create vcpkg cache directory
        run: mkdir -p ${{ github.workspace }}/vcpkg_cache

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-windows-amd64-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-windows-amd64-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Install pkg-config
        shell: pwsh
        run: choco install pkgconfiglite -y --allow-empty-checksums

      - name: Configure
        run: |
          cmake -B build -S . `
            -A x64 `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir release-server
          mkdir release-client
          mkdir release-client\config.d
          copy build\Release\cfrp.exe release-server\
          copy server.toml release-server\
          copy scripts\setup_windows_server.ps1 release-server\setup.ps1
          copy scripts\uninstall_windows_server.ps1 release-server\uninstall.ps1
          copy build\Release\cfrp.exe release-client\
          copy client.toml release-client\
          copy scripts\setup_windows_client.ps1 release-client\setup.ps1
          copy scripts\uninstall_windows_client.ps1 release-client\uninstall.ps1

          powershell Compress-Archive -Path release-server\* -DestinationPath cfrp-server-windows-amd64.zip
          powershell Compress-Archive -Path release-client\* -DestinationPath cfrp-client-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: cfrp-windows-amd64
          path: cfrp-*-windows-amd64.zip


  # =========================
  # Windows ARM64
  # =========================
  build-windows-arm64:
    name: Windows-arm64
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg_cache,readwrite"

    steps:
      - uses: actions/checkout@v4

      - name: Create vcpkg cache directory
        run: mkdir -p ${{ github.workspace }}/vcpkg_cache

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-windows-arm64-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-windows-arm64-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Install pkg-config
        shell: pwsh
        run: choco install pkgconfiglite -y --allow-empty-checksums

      - name: Configure
        run: |
          cmake -B build -S . `
            -A ARM64 `
            -DVCPKG_TARGET_TRIPLET=arm64-windows

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir release-server
          mkdir release-client
          mkdir release-client\config.d
          copy build\Release\cfrp.exe release-server\
          copy server.toml release-server\
          copy scripts\setup_windows_server.ps1 release-server\setup.ps1
          copy scripts\uninstall_windows_server.ps1 release-server\uninstall.ps1
          copy build\Release\cfrp.exe release-client\
          copy client.toml release-client\
          copy scripts\setup_windows_client.ps1 release-client\setup.ps1
          copy scripts\uninstall_windows_client.ps1 release-client\uninstall.ps1

          powershell Compress-Archive -Path release-server\* -DestinationPath cfrp-server-windows-arm64.zip
          powershell Compress-Archive -Path release-client\* -DestinationPath cfrp-client-windows-arm64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: cfrp-windows-arm64
          path: cfrp-*-windows-arm64.zip


  # =========================
  # RELEASE
  # =========================
  release:
    name: Create Release
    needs:
      [build-macos, build-linux-amd64, build-linux-arm64, build-windows-amd64, build-windows-arm64]

    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show files
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =========================
  # DOCKER BUILD
  # =========================
  build-docker:
    name: Build and Push Docker Image
    needs: [build-linux-amd64, build-linux-arm64]
    # Run on main branch or tags, but not on PRs (to avoid pushing unauthorized images)
    if: github.event_name != 'pull_request' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      REGISTRY: ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download Linux AMD64 artifact
        uses: actions/download-artifact@v4
        with:
          name: cfrp-linux-amd64
          path: dist/amd64

      - name: Download Linux ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: cfrp-linux-arm64
          path: dist/arm64

      - name: Prepare binaries for Docker build
        run: |
          mkdir -p bin/amd64 bin/arm64
          tar -xzf dist/amd64/cfrp-server-linux-amd64.tar.gz -C bin/amd64
          tar -xzf dist/arm64/cfrp-server-linux-arm64.tar.gz -C bin/arm64
          ls -R bin/

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,format=long
            type=edge,branch=main
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
