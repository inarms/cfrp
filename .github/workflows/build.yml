name: Build and Release

on:
  push:
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write


jobs:

  # =========================
  # macOS ARM64
  # =========================
  build-macos:
    name: macOS-arm64
    runs-on: macos-14
    env:
      VCPKG_BINARY_SOURCES: "clear;default"

    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Configure & Build
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_TRIPLET=arm64-osx \
            -DCMAKE_OSX_ARCHITECTURES=arm64

          cmake --build build --config Release

      - name: Package
        run: |
          mkdir -p release
          cp build/cfrp release/ || cp build/Release/cfrp release/
          cp server.toml release/
          cp client.toml release/

          cd release
          tar -czf ../cfrp-macos-arm64.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: cfrp-macos-arm64
          path: cfrp-macos-arm64.tar.gz


  # =========================
  # Linux AMD64 (GCC)
  # =========================
  build-linux-amd64:
    name: Linux-amd64 (GCC)
    runs-on: ubuntu-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;default"
      CFLAGS: "-Wno-error"
      CXXFLAGS: "-Wno-error"

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build pkg-config

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Configure
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DCMAKE_C_FLAGS="-Wno-error" \
            -DCMAKE_CXX_FLAGS="-Wno-error"

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p release
          cp build/cfrp release/
          cp server.toml release/
          cp client.toml release/
          strip release/cfrp || true

          cd release
          tar -czf ../cfrp-linux-amd64.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: cfrp-linux-amd64
          path: cfrp-linux-amd64.tar.gz


  # =========================
  # Linux ARM64 (GCC native)
  # =========================
  build-linux-arm64:
    name: Linux-arm64 (GCC)
    runs-on: ubuntu-24.04-arm
    env:
      VCPKG_BINARY_SOURCES: "clear;default"
      CFLAGS: "-Wno-error"
      CXXFLAGS: "-Wno-error"

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build pkg-config

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Configure
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_TRIPLET=arm64-linux \
            -DCMAKE_C_FLAGS="-Wno-error" \
            -DCMAKE_CXX_FLAGS="-Wno-error"

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p release
          cp build/cfrp release/
          cp server.toml release/
          cp client.toml release/
          strip release/cfrp || true

          cd release
          tar -czf ../cfrp-linux-arm64.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: cfrp-linux-arm64
          path: cfrp-linux-arm64.tar.gz


  # =========================
  # Windows AMD64
  # =========================
  build-windows-amd64:
    name: Windows-amd64
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;default"

    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Install pkg-config
        shell: pwsh
        run: choco install pkgconfiglite -y

      - name: Configure
        run: |
          cmake -B build -S . `
            -A x64 `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir release
          copy build\Release\cfrp.exe release\
          copy server.toml release\
          copy client.toml release\

          powershell Compress-Archive -Path release\* -DestinationPath cfrp-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: cfrp-windows-amd64
          path: cfrp-windows-amd64.zip


  # =========================
  # Windows ARM64
  # =========================
  build-windows-arm64:
    name: Windows-arm64
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;default"

    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Install pkg-config
        shell: pwsh
        run: choco install pkgconf -y

      - name: Configure
        run: |
          cmake -B build -S . `
            -A ARM64 `
            -DVCPKG_TARGET_TRIPLET=arm64-windows

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir release
          copy build\Release\cfrp.exe release\
          copy server.toml release\
          copy client.toml release\

          powershell Compress-Archive -Path release\* -DestinationPath cfrp-windows-arm64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: cfrp-windows-arm64
          path: cfrp-windows-arm64.zip


  # =========================
  # RELEASE
  # =========================
  release:
    name: Create Release
    needs:
      [build-macos, build-linux-amd64, build-linux-arm64, build-windows-amd64, build-windows-arm64]

    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show files
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
