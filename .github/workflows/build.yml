name: Build and Release

on:
  push:
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    env:
      VCPKG_BINARY_SOURCES: "clear;default"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-latest
            triplet: x64-linux
            binary_name: cfrp
          - target: linux-arm64
            os: ubuntu-latest
            triplet: arm64-linux
            binary_name: cfrp
          - target: macos-amd64
            os: macos-13
            triplet: x64-osx
            binary_name: cfrp
          - target: macos-arm64
            os: macos-14
            triplet: arm64-osx
            binary_name: cfrp
          - target: windows-amd64
            os: windows-latest
            triplet: x64-windows
            binary_name: cfrp.exe
          - target: windows-arm64
            os: windows-latest
            triplet: arm64-windows
            binary_name: cfrp.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libsystemd-dev build-essential ninja-build
          if [ "${{ matrix.target }}" == "linux-arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross
          fi

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'
          vcpkgTriplet: ${{ matrix.triplet }}

      - name: Configure and Build
        shell: bash
        run: |
          EXTRA_ARGS=""
          if [ "${{ matrix.target }}" == "linux-arm64" ]; then
            printf "set(CMAKE_SYSTEM_NAME Linux)\nset(CMAKE_SYSTEM_PROCESSOR aarch64)\nset(CMAKE_C_COMPILER aarch64-linux-gnu-gcc)\nset(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)\ninclude(\$ENV{VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake)\n" > arm64-toolchain.cmake
            EXTRA_ARGS="-DCMAKE_TOOLCHAIN_FILE=$(pwd)/arm64-toolchain.cmake"
          elif [ "${{ matrix.os }}" == "macos-13" ] || [ "${{ matrix.os }}" == "macos-14" ]; then
            EXTRA_ARGS="-DCMAKE_OSX_ARCHITECTURES=${{ matrix.target == 'macos-arm64' && 'arm64' || 'x86_64' }}"
          fi

          cmake -G Ninja -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
            $EXTRA_ARGS
            
          cmake --build build --config Release

      - name: Package Artifacts
        shell: bash
        run: |
          mkdir -p release
          if [ -f "build/${{ matrix.binary_name }}" ]; then
            cp build/${{ matrix.binary_name }} release/
          elif [ -f "build/Release/${{ matrix.binary_name }}" ]; then
            cp build/Release/${{ matrix.binary_name }} release/
          fi
          
          cp config_server.toml release/
          cp config_client.toml release/
          
          cd release
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a ../cfrp-${{ matrix.target }}.zip *
          else
            tar -czvf ../cfrp-${{ matrix.target }}.tar.gz *
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfrp-${{ matrix.target }}
          path: |
            cfrp-${{ matrix.target }}.tar.gz
            cfrp-${{ matrix.target }}.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/cfrp-*/*.tar.gz
            artifacts/cfrp-*/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
