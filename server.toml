# Example Server Configuration
[server]
bind_addr = "0.0.0.0"
bind_port = 7001
token = "secret_token"

# Virtual Host ports for HTTP and HTTPS (SNI routing)
vhost_http_port = 8080
vhost_https_port = 8443

# Optional: List of allowed ports or port ranges for proxies
# allowed_ports = [6000, "8000-9000"]

# Optional: List of allowed client names (whitelisting)
# allowed_clients = ["my-client", "office-pc"]

[server.ssl]
enable = true
auto_generate = true
cert_file = "certs/server.crt"
key_file = "certs/server.key"
ca_file = "certs/ca.crt"

# ... other server settings
